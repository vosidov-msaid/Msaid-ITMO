<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Метод ветвей и границ — Размещение</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Raleway:wght@800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f9fc;--surface:#fff;--surface2:#eef1f8;--border:#d0d6e8;--ink:#18213a;--blue:#2255cc;--red:#cc4422;--green:#1a9e5c;--orange:#e08c22;--muted:#7080a0;--pruned:#fff0ee;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;min-height:100vh;padding:20px;}
h1{font-family:'Raleway',sans-serif;font-size:1.4rem;font-weight:900;color:var(--blue);margin-bottom:2px;}
.subtitle{color:var(--muted);font-size:0.72rem;margin-bottom:18px;}
.top{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:820px;margin-bottom:16px;}
@media(max-width:650px){.top{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:16px;box-shadow:0 2px 8px rgba(34,85,204,0.06);}
.card-title{font-family:'Raleway',sans-serif;font-size:0.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;}
.controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
label{font-size:0.73rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
select{background:var(--surface2);border:1px solid var(--border);padding:5px 8px;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;border-radius:5px;color:var(--ink);}
button{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-family:'Raleway',sans-serif;font-size:0.7rem;font-weight:800;cursor:pointer;transition:opacity 0.12s;}
button:hover{opacity:0.85;}
button.sec{background:var(--surface);color:var(--ink);border:1.5px solid var(--border);}
button.go{background:var(--green);}
.edge-grid{display:grid;gap:6px;}
.edge-row{display:flex;gap:6px;align-items:center;font-size:0.75rem;}
.edge-label{min-width:76px;color:var(--muted);}
.edge-label span{color:var(--blue);font-weight:700;}
.edge-input{width:52px;background:var(--surface2);border:1px solid var(--border);color:var(--ink);padding:5px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;text-align:center;outline:none;}
.edge-input:focus{border-color:var(--blue);background:rgba(34,85,204,0.05);}
.d-matrix{font-size:0.72rem;overflow-x:auto;}
.d-matrix table{border-collapse:collapse;}
.d-matrix th,.d-matrix td{border:1px solid var(--border);width:34px;height:30px;text-align:center;}
.d-matrix th{background:var(--surface2);color:var(--blue);font-weight:700;}
.d-matrix td{background:var(--bg);}
.d-matrix td.diag{background:var(--surface2);color:var(--muted);}
.d-matrix td input{width:26px;height:24px;background:transparent;border:none;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--ink);outline:none;}
.d-matrix td input:focus{background:rgba(34,85,204,0.06);}

/* Tree layout */
.tree-wrap{max-width:1100px;}
.glb-block{background:var(--surface);border:1.5px solid var(--blue);border-radius:8px;padding:14px 18px;margin-bottom:14px;}
.glb-title{font-family:'Raleway',sans-serif;font-size:0.7rem;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}

/* Each step is a full-width block */
.step-block{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:10px;animation:pop 0.2s ease;}
.step-block.chosen{border-color:var(--green);}
.step-title{font-family:'Raleway',sans-serif;font-size:0.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:10px;}

/* Candidate nodes row */
.candidates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.cand{border:1.5px solid var(--border);border-radius:6px;padding:10px 13px;font-size:0.71rem;min-width:210px;background:var(--surface2);transition:border-color 0.15s;}
.cand.chosen{border-color:var(--green);background:#eafaf2;}
.cand.pruned{border-color:var(--red);background:var(--pruned);opacity:0.8;}
.cand.same{border-color:var(--muted);opacity:0.7;} /* symmetric duplicate */
.cand-head{font-weight:700;color:var(--blue);margin-bottom:5px;font-size:0.73rem;}
.cand-line{font-size:0.69rem;color:var(--muted);line-height:1.75;}
.cand-line .v{color:var(--ink);}
.cand-line .hi{color:var(--blue);font-weight:700;}
.cand-line .eq{color:var(--green);font-weight:700;}
.cand-line .rd{color:var(--red);}
.bound-line{font-family:'Raleway',sans-serif;font-weight:800;font-size:0.82rem;margin-top:6px;}
.bound-line.good{color:var(--green);}
.bound-line.bad{color:var(--red);}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:0.6rem;font-weight:700;vertical-align:middle;margin-left:5px;}
.badge.ok{background:var(--green);color:#fff;}
.badge.no{background:var(--red);color:#fff;}
.badge.sym{background:var(--muted);color:#fff;}

/* Decision line */
.decision{font-size:0.74rem;color:var(--ink);background:rgba(34,85,204,0.06);border-left:3px solid var(--blue);padding:7px 12px;border-radius:0 5px 5px 0;margin-top:6px;}
.decision strong{color:var(--blue);}

.result-box{max-width:1100px;margin-top:14px;background:var(--ink);color:var(--bg);border-radius:8px;padding:18px 20px;}
.result-box h3{font-family:'Raleway',sans-serif;font-size:0.85rem;font-weight:900;margin-bottom:8px;}
.place-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.pchip{background:rgba(255,255,255,0.1);border-radius:5px;padding:5px 12px;font-size:0.78rem;}
.pchip span{color:#f7a06a;font-weight:700;}
.empty-msg{color:var(--muted);font-size:0.78rem;font-style:italic;padding:20px;text-align:center;}
@keyframes pop{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<h1>Метод ветвей и границ</h1>
<p class="subtitle">Оптимальное размещение элементов · F(P) = Σ<sub>i&lt;j</sub> r<sub>ij</sub>·d<sub>p(i)p(j)</sub> → min</p>

<div class="controls">
  <label>Элементов (m):
    <select id="mCount" onchange="rebuild()">
      <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
    </select>
  </label>
  <button onclick="loadExample()">Пример из методички</button>
  <button class="sec" onclick="rebuild()">Очистить</button>
  <button class="go" onclick="solve()">▶ Решить</button>
</div>

<div class="top">
  <div class="card">
    <div class="card-title">Матрица соединений R</div>
    <div class="edge-grid" id="edgeInputs"></div>
  </div>
  <div class="card">
    <div class="card-title">Матрица расстояний D</div>
    <div class="d-matrix" id="dMatWrap"></div>
    <p style="font-size:0.67rem;color:var(--muted);margin-top:8px;">По умолчанию — линейная цепочка позиций</p>
  </div>
</div>

<div class="tree-wrap" id="treeOut"><div class="empty-msg">Заполни матрицы и нажми ▶ Решить</div></div>
<div id="resultOut"></div>

<script>
let M=4, Rmat=[], Dmat=[];
function getE(i){return 'e'+(i+1);}
function getP(i){return 'p'+(i+1);}

function rebuild(){
  M=parseInt(document.getElementById('mCount').value);
  Rmat=Array.from({length:M},()=>Array(M).fill(0));
  Dmat=Array.from({length:M},(_,i)=>Array.from({length:M},(_,j)=>Math.abs(i-j)));
  renderEdgeInputs(); renderDmat();
  document.getElementById('treeOut').innerHTML='<div class="empty-msg">Заполни матрицы и нажми ▶ Решить</div>';
  document.getElementById('resultOut').innerHTML='';
}

function renderEdgeInputs(){
  let html='';
  for(let i=0;i<M;i++) for(let j=i+1;j<M;j++){
    html+=`<div class="edge-row">
      <span class="edge-label">r(<span>${getE(i)}</span>–<span>${getE(j)}</span>):</span>
      <input class="edge-input" type="number" min="0" id="r_${i}_${j}" value="${Rmat[i][j]||''}" placeholder="0"
        oninput="Rmat[${i}][${j}]=+this.value||0;Rmat[${j}][${i}]=+this.value||0;">
    </div>`;
  }
  document.getElementById('edgeInputs').innerHTML=html;
}

function renderDmat(){
  let html='<table><tr><th>D</th>';
  for(let j=0;j<M;j++) html+=`<th>${getP(j)}</th>`;
  html+='</tr>';
  for(let i=0;i<M;i++){
    html+=`<tr><th>${getP(i)}</th>`;
    for(let j=0;j<M;j++){
      if(i===j) html+='<td class="diag">0</td>';
      else if(i>j) html+=`<td class="diag" id="dm_${i}_${j}">${Dmat[i][j]}</td>`;
      else html+=`<td><input type="number" min="0" id="dm_${i}_${j}" value="${Dmat[i][j]}"
        oninput="Dmat[${i}][${j}]=+this.value||0;Dmat[${j}][${i}]=+this.value||0;const m=document.getElementById('dm_${j}_${i}');if(m)m.textContent=+this.value||0;"></td>`;
    }
    html+='</tr>';
  }
  document.getElementById('dMatWrap').innerHTML=html+'</table>';
}

function loadExample(){
  document.getElementById('mCount').value='4'; M=4;
  Rmat=[[0,1,3,4],[1,0,2,0],[3,2,0,1],[4,0,1,0]];
  Dmat=[[0,1,2,3],[1,0,1,2],[2,1,0,1],[3,2,1,0]];
  renderEdgeInputs();
  for(let i=0;i<M;i++) for(let j=i+1;j<M;j++){
    const el=document.getElementById(`r_${i}_${j}`); if(el) el.value=Rmat[i][j];
  }
  renderDmat();
}

// ---- MATH ----
function calcFfull(placement, R, D){
  // placement: array, placement[i] = position of element i
  let f=0;
  for(let i=0;i<placement.length;i++) for(let j=i+1;j<placement.length;j++){
    f+=R[i][j]*D[placement[i]][placement[j]];
  }
  return f;
}

function calcFq(placed, R, D){
  const elems=Object.keys(placed).map(Number);
  let f=0;
  for(let a=0;a<elems.length;a++) for(let b=a+1;b<elems.length;b++){
    f+=R[elems[a]][elems[b]]*D[placed[elems[a]]][placed[elems[b]]];
  }
  return f;
}

function computeBound(placed, R, D, m){
  const placedElems=Object.keys(placed).map(Number);
  const placedPos=Object.values(placed).map(Number);
  const freeElems=Array.from({length:m},(_,i)=>i).filter(i=>!placedElems.includes(i));
  const freePos=Array.from({length:m},(_,i)=>i).filter(i=>!placedPos.includes(i));
  const fq=calcFq(placed,R,D);

  // w(q): each placed elem ei — connect to free elems, minimizing over free positions
  let wq=0;
  const wDetails=[];
  for(const ei of placedElems){
    // r-values: r[ei][es] for each free es, sorted desc
    const rPairs=freeElems.map(es=>({es,val:R[ei][es]}));
    rPairs.sort((a,b)=>b.val-a.val);
    // d-values: D[placed[ei]][pk] for each free pk, sorted asc
    const dPairs=freePos.map(pk=>({pk,val:D[placed[ei]][pk]}));
    dPairs.sort((a,b)=>a.val-b.val);
    let contrib=0;
    const pairs=[];
    for(let k=0;k<rPairs.length;k++){
      const prod=rPairs[k].val*dPairs[k].val;
      contrib+=prod;
      pairs.push({r:rPairs[k].val,d:dPairs[k].val,prod,esName:getE(rPairs[k].es),pkName:getP(dPairs[k].pk)});
    }
    wq+=contrib;
    wDetails.push({ei,contrib,pairs,rVec:rPairs.map(x=>x.val),dVec:dPairs.map(x=>x.val)});
  }

  // v(q): upper triangle of R restricted to freeElems, upper triangle of D restricted to freePos
  const rv=[], dv=[];
  for(let a=0;a<freeElems.length;a++) for(let b=a+1;b<freeElems.length;b++){
    rv.push({val:R[freeElems[a]][freeElems[b]],eiName:getE(freeElems[a]),ejName:getE(freeElems[b])});
  }
  for(let a=0;a<freePos.length;a++) for(let b=a+1;b<freePos.length;b++){
    dv.push({val:D[freePos[a]][freePos[b]],piName:getP(freePos[a]),pjName:getP(freePos[b])});
  }
  rv.sort((a,b)=>b.val-a.val); dv.sort((a,b)=>a.val-b.val);
  let vq=0;
  const vPairs=[];
  for(let k=0;k<Math.min(rv.length,dv.length);k++){
    const prod=rv[k].val*dv[k].val; vq+=prod;
    vPairs.push({r:rv[k],d:dv[k],prod});
  }

  return {bound:fq+wq+vq,fq,wq,vq,freeElems,freePos,wDetails,rv,dv,vPairs};
}

// ---- RENDER helpers ----
function renderCandDetail(node, R, D, m){
  const placed=node.placement;
  const info=node.info;
  const freeENames=(info.freeElems||[]).map(getE);
  const freePNames=(info.freePos||[]).map(getP);

  let html='';

  if(node.full){
    // show all pairs
    const elems=Object.keys(placed).map(Number);
    const terms=[];
    for(let a=0;a<elems.length;a++) for(let b=a+1;b<elems.length;b++){
      const ei=elems[a],es=elems[b];
      const r=R[ei][es], d=D[placed[ei]][placed[es]];
      terms.push(`r(${getE(ei)},${getE(es)})·d(${getP(placed[ei])},${getP(placed[es])}) = ${r}·${d} = ${r*d}`);
    }
    html+=`<div class="cand-line">F(P) = ${terms.join('<br>       + ')} = <span class="eq">${node.info.bound}</span></div>`;
    return html;
  }

  // F(q)
  const placedElems=Object.keys(placed).map(Number);
  const fqTerms=[];
  for(let a=0;a<placedElems.length;a++) for(let b=a+1;b<placedElems.length;b++){
    const ei=placedElems[a],es=placedElems[b];
    const r=R[ei][es], d=D[placed[ei]][placed[es]];
    fqTerms.push(`r(${getE(ei)},${getE(es)})·d(${getP(placed[ei])},${getP(placed[es])}) = ${r}·${d} = <span class="v">${r*d}</span>`);
  }
  html+=`<div class="cand-line"><span class="hi">F(q)</span> = ${fqTerms.length?fqTerms.join(' + '):'0'} = <span class="v">${info.fq}</span></div>`;

  // w(q)
  html+=`<div class="cand-line" style="margin-top:3px"><span class="hi">w(q)</span> — соединения размещённых с неразмещ. {${freeENames.join(',')}}:</div>`;
  (info.wDetails||[]).forEach(wd=>{
    const rStr='['+wd.rVec.join(', ')+']';
    const dStr='['+wd.dVec.join(', ')+']';
    const calc=wd.pairs.map(p=>`${p.r}·${p.d}`).join(' + ')||'0';
    html+=`<div class="cand-line">&nbsp;&nbsp;${getE(wd.ei)} (в ${getP(placed[wd.ei])}): r↓=${rStr}, d↑=${dStr}<br>&nbsp;&nbsp;→ ${calc} = <span class="v">${wd.contrib}</span></div>`;
  });
  html+=`<div class="cand-line"><span class="hi">w(q)</span> итого = <span class="v">${info.wq}</span></div>`;

  // v(q)
  html+=`<div class="cand-line" style="margin-top:3px"><span class="hi">v(q)</span> — оценка соединений между неразмещ. {${freeENames.join(',')}}:</div>`;
  if((info.vPairs||[]).length>0){
    const rVec=info.vPairs.map(p=>`${p.r.eiName}-${p.r.ejName}:${p.r.val}`);
    const dVec=info.vPairs.map(p=>`${p.d.piName}-${p.d.pjName}:${p.d.val}`);
    const calc=info.vPairs.map(p=>`${p.r.val}·${p.d.val}`).join(' + ');
    html+=`<div class="cand-line">&nbsp;&nbsp;r(верх.трёуг.) ↓ = [${rVec.join(', ')}]<br>&nbsp;&nbsp;d(верх.трёуг.) ↑ = [${dVec.join(', ')}]<br>&nbsp;&nbsp;→ ${calc} = <span class="v">${info.vq}</span></div>`;
  } else {
    html+=`<div class="cand-line">&nbsp;&nbsp;Остался 1 неразмещённый элемент → v(q) = 0</div>`;
  }

  return html;
}

// ---- SOLVE ----
function solve(){
  const R=Rmat, D=Dmat, m=M;
  // sync inputs
  for(let i=0;i<m;i++) for(let j=i+1;j<m;j++){
    const el=document.getElementById(`r_${i}_${j}`); if(el){Rmat[i][j]=+el.value||0;Rmat[j][i]=+el.value||0;}
  }
  for(let i=0;i<m;i++) for(let j=i+1;j<m;j++){
    const el=document.getElementById(`dm_${i}_${j}`); if(el&&el.tagName==='INPUT'){Dmat[i][j]=+el.value||0;Dmat[j][i]=+el.value||0;}
  }

  let html='';

  // --- Global lower bound ---
  const glbInfo=computeBound({},R,D,m);
  const rVec0=glbInfo.rv.map(x=>x.val);
  const dVec0=glbInfo.dv.map(x=>x.val);
  const glbCalc=rVec0.map((v,k)=>`${v}·${dVec0[k]}`).join(' + ');
  html+=`<div class="glb-block">
    <div class="glb-title">Глобальная нижняя граница F(P) ≥ ?</div>
    <div style="font-size:0.72rem;line-height:1.8;">
      Берём верхний треугольник матрицы R (все r<sub>ij</sub>, i&lt;j), сортируем по убыванию:<br>
      <strong>r</strong> = [${rVec0.join(', ')}]&nbsp; (${glbInfo.rv.map(x=>`r(${x.eiName},${x.ejName})=${x.val}`).join(', ')})<br>
      Берём верхний треугольник матрицы D, сортируем по возрастанию:<br>
      <strong>d</strong> = [${dVec0.join(', ')}]&nbsp; (${glbInfo.dv.map(x=>`d(${x.piName},${x.pjName})=${x.val}`).join(', ')})<br>
      <strong>r·d</strong> = ${glbCalc} = <strong style="color:var(--green)">${glbInfo.bound}</strong><br>
      Для любого размещения F(P) ≥ <strong>${glbInfo.bound}</strong>
    </div>
  </div>`;

  // --- BFS через ярусы, но на каждом ярусе ТОЛЬКО одна ветка (минимальная граница) ---
  // На каждом шаге у нас одно текущее частичное размещение.
  // Мы перебираем ВСЕ свободные позиции для текущего элемента, показываем границы,
  // выбираем минимальную и продолжаем по ней.
  // НА ПОСЛЕДНЕМ шаге (когда остался 1 неразмещённый элемент) перебираем оставшиеся варианты полностью.

  let currentPlaced = {}; // текущее частичное размещение
  let stepNum = 1;

  for(let elemIdx=0; elemIdx<m; elemIdx++){
    const usedPos=Object.values(currentPlaced).map(Number);
    const freePos=Array.from({length:m},(_,i)=>i).filter(p=>!usedPos.includes(p));
    const isLastStep=(elemIdx===m-1);
    const isPreLastStep=(elemIdx===m-2);

    // Compute bounds for all free positions
    const candidates=freePos.map(pos=>{
      const newPl={...currentPlaced,[elemIdx]:pos};
      const full=Object.keys(newPl).length===m;
      let info;
      if(full){
        const fq=calcFq(newPl,R,D);
        info={bound:fq,fq,wq:0,vq:0,freeElems:[],freePos:[],wDetails:[],rv:[],dv:[],vPairs:[]};
      } else {
        info=computeBound(newPl,R,D,m);
      }
      return {pos,placement:newPl,info,full};
    });

    // For the last two elements together: show both remaining options as full placements
    if(isPreLastStep){
      // We'll show all candidates (there are 2 free positions), and for each
      // also try the single remaining element
      const expandedCands=[];
      candidates.forEach(cand=>{
        // For this assignment of elem[m-2], there's exactly 1 remaining pos for elem[m-1]
        const remPos=Array.from({length:m},(_,i)=>i).filter(p=>!Object.values(cand.placement).map(Number).includes(p));
        remPos.forEach(rp=>{
          const fullPl={...cand.placement,[m-1]:rp};
          const fq=calcFq(fullPl,R,D);
          expandedCands.push({pos:cand.pos,lastPos:rp,placement:fullPl,info:{bound:fq,fq,wq:0,vq:0,freeElems:[],freePos:[],wDetails:[],rv:[],dv:[],vPairs:[]},full:true,parentCand:cand});
        });
      });

      const minBound=Math.min(...expandedCands.map(c=>c.info.bound));
      const bestCand=expandedCands.find(c=>c.info.bound===minBound);

      // Build placed-string for context
      const ctx=Object.entries(currentPlaced).sort(([a],[b])=>+a-+b).map(([e,p])=>`${getE(+e)}→${getP(+p)}`).join(', ');

      let candsHtml='<div class="candidates">';
      expandedCands.forEach(cand=>{
        const isBest=cand.info.bound===minBound;
        const cls=isBest?'chosen':'';
        const plStr=Object.entries(cand.placement).sort(([a],[b])=>+a-+b).map(([e,p])=>`${getE(+e)}→${getP(+p)}`).join(', ');
        // show full F(P) calc
        const elems=Object.keys(cand.placement).map(Number);
        const terms=[];
        for(let a=0;a<elems.length;a++) for(let b=a+1;b<elems.length;b++){
          const ei=elems[a],es=elems[b];
          const r=R[ei][es],d=D[cand.placement[ei]][cand.placement[es]];
          terms.push(`r(${getE(ei)},${getE(es)})·d(${getP(cand.placement[ei])},${getP(cand.placement[es])}) = ${r}·${d} = ${r*d}`);
        }
        candsHtml+=`<div class="cand ${cls}">
          <div class="cand-head">${plStr}</div>
          <div class="cand-line">F(P) = ${terms.join('<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;+ ')}</div>
          <div class="bound-line ${isBest?'good':'bad'}">F(P) = ${cand.info.bound}${isBest?'<span class="badge ok">оптимум</span>':''}</div>
        </div>`;
      });
      candsHtml+='</div>';

      html+=`<div class="step-block chosen">
        <div class="step-title">Шаги ${stepNum}–${stepNum+1} — Размещение ${getE(elemIdx)} и ${getE(elemIdx+1)} (оставшиеся позиции)</div>
        ${ctx?`<div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;">Зафиксировано: ${ctx}</div>`:''}
        <div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;">Осталось 2 позиции — перебираем оба варианта полностью:</div>
        ${candsHtml}
        <div class="decision">Оптимальное размещение: <strong>${Object.entries(bestCand.placement).sort(([a],[b])=>+a-+b).map(([e,p])=>`${getE(+e)}→${getP(+p)}`).join(', ')}</strong>, F* = <strong>${minBound}</strong></div>
      </div>`;

      currentPlaced=bestCand.placement;
      break;
    }

    // Normal step: show all candidates, choose minimum
    const minBound=Math.min(...candidates.map(c=>c.info.bound));
    const bestCand=candidates.find(c=>c.info.bound===minBound);
    const ctx=Object.entries(currentPlaced).sort(([a],[b])=>+a-+b).map(([e,p])=>`${getE(+e)}→${getP(+p)}`).join(', ');

    let candsHtml='<div class="candidates">';
    candidates.forEach(cand=>{
      const isBest=cand.info.bound===minBound;
      const cls=isBest?'chosen':'';
      const detail=renderCandDetail(cand,R,D,m);
      const plStr=Object.entries(cand.placement).sort(([a],[b])=>+a-+b).map(([e,p])=>`${getE(+e)}→${getP(+p)}`).join(', ');
      const boundExpr=cand.full
        ? `F(P) = ${cand.info.bound}`
        : `F(q)+w(q)+v(q) = ${cand.info.fq}+${cand.info.wq}+${cand.info.vq} = ${cand.info.bound}`;
      candsHtml+=`<div class="cand ${cls}">
        <div class="cand-head">${getE(elemIdx)} → ${getP(cand.pos)}</div>
        ${detail}
        <div class="bound-line ${isBest?'good':'bad'}">${boundExpr}${isBest?'<span class="badge ok">выбираем</span>':''}</div>
      </div>`;
    });
    candsHtml+='</div>';

    html+=`<div class="step-block ${bestCand?'chosen':''}">
      <div class="step-title">Шаг ${stepNum} — Размещение ${getE(elemIdx)}</div>
      ${ctx?`<div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;">Зафиксировано: ${ctx}</div>`:''}
      ${candsHtml}
      <div class="decision">Минимальная граница = <strong>${minBound}</strong> → назначаем <strong>${getE(elemIdx)} → ${getP(bestCand.pos)}</strong></div>
    </div>`;

    currentPlaced={...currentPlaced,[elemIdx]:bestCand.pos};
    stepNum++;
  }

  document.getElementById('treeOut').innerHTML=html;

  // Final result
  if(Object.keys(currentPlaced).length===m){
    const pl=currentPlaced;
    const fStar=calcFfull(Array.from({length:m},(_,i)=>pl[i]),R,D);
    const pos=Array.from({length:m},(_,i)=>({elem:i,pos:pl[i]})).sort((a,b)=>a.pos-b.pos);
    document.getElementById('resultOut').innerHTML=`
      <div class="result-box">
        <h3>📍 Оптимальное размещение · F* = ${fStar}</h3>
        <div class="place-chips">
          ${pos.map(({elem,pos})=>`<div class="pchip">${getP(pos)}: <span>${getE(elem)}</span></div>`).join('')}
        </div>
        <div style="margin-top:10px;font-size:0.72rem;color:rgba(255,255,255,0.5)">
          ${Array.from({length:m},(_,e)=>`${getE(e)} → ${getP(pl[e])}`).join(' | ')}
        </div>
      </div>`;
  }
}

rebuild(); loadExample();
</script>
</body>
</html>
